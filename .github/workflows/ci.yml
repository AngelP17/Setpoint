name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace --all-targets

  build:
    name: build
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --workspace
      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: setpoint-binaries
          path: |
            target/release/operator
            target/release/setpointctl
            target/release/mock-plc
            target/release/drift-simulator

  helm-lint:
    name: helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.14.0
      - run: helm lint charts/setpoint
      - run: helm template setpoint charts/setpoint > /tmp/rendered.yaml
      - name: Smoke-check rendered CRD group
        run: |
          grep -q "group: setpoint.io" /tmp/rendered.yaml || (echo "rendered CRD does not contain setpoint.io group"; exit 1)
          grep -q "name: industrialplcs.setpoint.io" /tmp/rendered.yaml || (echo "rendered CRD name missing"; exit 1)
