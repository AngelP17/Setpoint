apiVersion: setpoint.io/v1
kind: IndustrialPLC
metadata:
  name: line-1-printer-plc
  namespace: default
  labels:
    app: setpoint
    line: "1"
spec:
  deviceAddress: "setpoint-mock-plc.default.svc.cluster.local"
  port: 5502
  registers:
    - name: conveyor-speed
      address: 4001
      desiredValue: 2500
      remediation:
        strategy: Auto
        pollIntervalSecs: 5
        maxCorrectionsPerHour: 60
        cooldownSecs: 5
    - name: print-head-position
      address: 4002
      desiredValue: 1200
      remediation:
        strategy: Alert
        pollIntervalSecs: 5
        maxCorrectionsPerHour: 0
        cooldownSecs: 30
  tags:
    - production
    - printer-line
    - critical
---
apiVersion: setpoint.io/v1
kind: IndustrialPLC
metadata:
  name: line-2-conveyor-plc
  namespace: default
  labels:
    app: setpoint
    line: "2"
spec:
  deviceAddress: "setpoint-mock-plc.default.svc.cluster.local"
  port: 5502
  registers:
    - name: conveyor-speed
      address: 4001
      desiredValue: 2500
      remediation:
        strategy: Auto
        pollIntervalSecs: 10
        maxCorrectionsPerHour: 60
        cooldownSecs: 30
  tags:
    - production
    - conveyor
