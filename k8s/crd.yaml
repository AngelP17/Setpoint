apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: industrialplcs.setpoint.io
spec:
  group: setpoint.io
  names:
    kind: IndustrialPLC
    plural: industrialplcs
    shortNames:
      - plc
    singular: industrialplc
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - deviceAddress
                - registers
              properties:
                deviceAddress:
                  type: string
                  description: "IP address or hostname of the PLC device"
                port:
                  type: integer
                  default: 502
                  description: "Modbus TCP port"
                registers:
                  type: array
                  minItems: 1
                  description: "Registers to monitor and reconcile on this PLC"
                  items:
                    type: object
                    required:
                      - name
                      - address
                      - desiredValue
                    properties:
                      name:
                        type: string
                        description: "Logical name of the register"
                      address:
                        type: integer
                        description: "Modbus register address"
                      desiredValue:
                        type: integer
                        description: "Desired value for this register"
                      remediation:
                        type: object
                        description: "Remediation policy for drift on this register"
                        properties:
                          strategy:
                            type: string
                            enum:
                              - Auto
                              - Alert
                              - Halt
                            default: Auto
                          pollIntervalSecs:
                            type: integer
                            default: 5
                            description: "Polling interval in seconds"
                          maxCorrectionsPerHour:
                            type: integer
                            default: 10
                            description: "Maximum automatic corrections per hour (0 = unlimited)"
                          cooldownSecs:
                            type: integer
                            default: 30
                            description: "Cooldown between corrections in seconds"
                tags:
                  type: array
                  items:
                    type: string
                  description: "Optional tags for the PLC"
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Pending
                    - Connecting
                    - Connected
                    - DriftDetected
                    - Correcting
                    - Failed
                lastUpdate:
                  type: string
                registers:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      address:
                        type: integer
                      currentValue:
                        type: integer
                      inSync:
                        type: boolean
                      driftEvents:
                        type: integer
                      correctionsApplied:
                        type: integer
                      lastDriftAt:
                        type: string
                      lastCorrectionAt:
                        type: string
                      strategy:
                        type: string
                        enum:
                          - Auto
                          - Alert
                          - Halt
                lastError:
                  type: string
                message:
                  type: string
      subresources:
        status: {}
