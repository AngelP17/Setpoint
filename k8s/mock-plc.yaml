apiVersion: apps/v1
kind: Deployment
metadata:
  name: setpoint-mock-plc
  labels:
    app: setpoint-mock-plc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: setpoint-mock-plc
  template:
    metadata:
      labels:
        app: setpoint-mock-plc
    spec:
      containers:
      - name: setpoint-mock-plc
        image: setpoint-mock-plc:latest
        imagePullPolicy: Never
        args:
          - --bind=0.0.0.0
          - --port=5502
          - --registers=4001:2500,4002:1200,4003:0
        ports:
        - containerPort: 5502
          name: modbus
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
          requests:
            cpu: 50m
            memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: setpoint-mock-plc
  labels:
    app: setpoint-mock-plc
spec:
  type: ClusterIP
  selector:
    app: setpoint-mock-plc
  ports:
  - port: 5502
    targetPort: 5502
    name: modbus
    protocol: TCP
